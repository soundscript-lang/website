  </g>
  <g transform="translate(286, 452)">
    <rect width="184" height="42" rx="21" fill="rgba(168, 85, 247, 0.16)" />
    <text
      x="92"
      y="28"
      text-anchor="middle"
      fill="#F5EFFF"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
